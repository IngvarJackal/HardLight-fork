# Manawa Rite Hoodie
- type: entity
  parent: ClothingOuterBaseToggleable
  id: ClothingOuterHoodieManawaRite
  name: Manawa Rite hoodie
  description: A distinctive reinforced hoodie worn by members of the Manawa Rite.
  components:
  - type: Sprite
    sprite: _HL/Factions/ManawaRite/Clothing/OuterClothing/manawa_rite_hoodie.rsi
  - type: Clothing
    sprite: _HL/Factions/ManawaRite/Clothing/OuterClothing/manawa_rite_hoodie.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHatHoodManawaRite
  - type: Armor # bounty hunter flak trenchcoat stats
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.4
        Heat: 0.9
  - type: ExplosionResistance
    damageCoefficient: 0.80
  - type: Storage
    grid:
    - 0,0,2,1
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface

# Manawa Rite Robe
- type: entity
  parent: [ClothingOuterStorageBase, AllowSuitStorageClothing]
  id: ClothingOuterRobeManawaRite
  name: Manawa Rite robe
  description: A distinctive reinforced robe worn by members of the Manawa Rite.
  components:
  - type: Sprite
    sprite: _HL/Factions/ManawaRite/Clothing/OuterClothing/manawa_rite_robe.rsi
  - type: Clothing
    sprite: _HL/Factions/ManawaRite/Clothing/OuterClothing/manawa_rite_robe.rsi
  - type: Armor # merc web vest
    modifiers:
      coefficients:
        Blunt: 0.75
        Slash: 0.75
        Piercing: 0.75
        Heat: 0.80
        Caustic: 0.9
  - type: ExplosionResistance
    damageCoefficient: 0.90
