# Manawa Rite Hoodie
- type: entity
  parent: ClothingOuterBaseToggleable
  id: ClothingOuterHoodieManawaRite
  name: Manawa Rite hoodie
  description: A distinctive reinforced hoodie worn by members of the Manawa Rite.
  components:
  - type: Sprite
    sprite: _HL/Clothing/OuterClothing/manawa_rite_hoodie.rsi
  - type: Clothing
    sprite: _HL/Clothing/OuterClothing/manawa_rite_hoodie.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHatHoodManawaRite
  - type: Armor # bounty hunter flak trenchcoat stats
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.4
        Heat: 0.9
  - type: ExplosionResistance
    damageCoefficient: 0.80

# Manawa Rite Robe
- type: entity
  parent: [ClothingOuterStorageBase, AllowSuitStorageClothing]
  id: ClothingOuterRobeManawaRite
  name: Manawa Rite robe
  description: A distinctive reinforced robe worn by members of the Manawa Rite.
  components:
  - type: Sprite
    sprite: _HL/Clothing/OuterClothing/manawa_rite_robe.rsi
  - type: Clothing
    sprite: _HL/Clothing/OuterClothing/manawa_rite_robe.rsi
  - type: Armor # merc web vest
    modifiers:
      coefficients:
        Blunt: 0.75
        Slash: 0.75
        Piercing: 0.75
        Heat: 0.80
        Caustic: 0.9
  - type: ExplosionResistance
    damageCoefficient: 0.90

- type: entity
  parent: ClothingOuterBase
  id: HLClothingOuterRobesClockwork
  name: clockwork robes
  description: What is a clockwork cult without clockwork robes?
  components:
  - type: Sprite
    sprite: _HL/Clothing/OuterClothing/clockwork_robes.rsi
  - type: Clothing
    sprite: _HL/Clothing/OuterClothing/clockwork_robes.rsi

# Station Sec suit mostly for shelegs. Differs from the existing security EVA suit in that it's inline with the other _NL EVA suits.
# No new graphics here -- just altering the colors from the existing NFClothingOuterEVASuitBase.
- type: entity
  parent: NFClothingOuterEVASuitBase
  id: ClothingOuterEVASuitHLSec
  name: station security EVA suit
  description: An EVA suit with a built-in helmet issued in sepecific circumstances to security officers who are less than tolerant of a station or shuttle's atmosphere.
  components:
  - type: Sprite
    sprite: _NF/Clothing/OuterClothing/Suits/eva_color.rsi
    layers:
    - state: icon-base
      color: "#2E2E2E"
    - state: icon-decals-01
      color: "#00CFC6"
    - state: icon-reinforced-points
      color: "#C0C0C0"
    - state: icon-breathing-gear
    - state: icon-unshaded
      shader: unshaded
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-base
        color: "#2E2E2E"
      - state: inhand-left-decals-01
        color: "#00CFC6"
      - state: inhand-left-reinforced-points
        color: "#C0C0C0"
      - state: inhand-left-breathing-gear
      - state: inhand-left-unshaded
        shader: unshaded
      right:
      - state: inhand-right-base
        color: "#2E2E2E"
      - state: inhand-right-decals-01
        color: "#00CFC6"
      - state: inhand-right-reinforced-points
        color: "#C0C0C0"
      - state: inhand-right-breathing-gear
      - state: inhand-right-unshaded
        shader: unshaded
  - type: Clothing
    sprite: _NF/Clothing/OuterClothing/Suits/eva_color.rsi
    clothingVisuals:
      outerClothing:
      - state: equipped-base
        color: "#2E2E2E"
      - state: equipped-decals-01
        color: "#00CFC6"
      - state: equipped-reinforced-points
        color: "#C0C0C0"
      - state: equipped-breathing-gear
      - state: equipped-unshaded
        shader: unshaded
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadEVAHelmetHLSec



- type: entity
  parent: ClothingHeadEVAHelmetWithLightBase
  id: ClothingHeadEVAHelmetHLSec
  name: station security EVA helmet
#  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _NF/Clothing/Head/Helmets/eva_color.rsi
    layers:
    - state: icon-base
      color: "#2E2E2E"
    - state: icon-reinforced-points
      color: "#00CFC6"
    - state: icon-visor
      color: "#110F0F"
  - type: Clothing
    sprite: _NF/Clothing/Head/Helmets/eva_color.rsi
    clothingVisuals:
      head:
      - state: equipped-head-base
        color: "#2E2E2E"
      - state: equipped-head-reinforced-points
        color: "#00CFC6"
      - state: equipped-head-visor
        color: "#110F0F"
