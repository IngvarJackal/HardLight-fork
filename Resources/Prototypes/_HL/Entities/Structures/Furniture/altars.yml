- type: entity
  id: AltarManawaRite
  parent: BaseLathe
  name: Manawa Rite altar
  description: A sacred altar of the Manawa Rite.
  components:
  - type: Sprite
    sprite: _HL/Structures/Furniture/Altars/manawa_rite_altar.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
  - type: Icon
    sprite: _HL/Structures/Furniture/Altars/manawa_rite_altar.rsi
    state: icon
  - type: PointLight
    radius: 1.5
    energy: 0.1
    color: "#00e8c8"
  - type: ApcPowerReceiver
    powerLoad: 0
  - type: Machine
    board: ManaCore
  - type: Lathe
    idleState: icon
    runningState: icon
    timeMultiplier: 0.5
    staticPacks:
    - ManawaRiteStatic
  - type: MaterialStorage
    canEjectStoredMaterials: true
    whitelist:
      tags:
      - Sheet
      - RawMaterial
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container

- type: entity
  id: AbyssAltar
  parent: AltarBase
  name: abyssal altar
  components:
  - type: Sprite
    sprite: _HL/Structures/Furniture/Altars/goldabyssaltar.rsi
    layers:
    - state: abyss
    - state: lightning
      shader: unshaded
  - type: Icon
    sprite: _HL/Structures/Furniture/Altars/goldabyssaltar.rsi
    state: abyss
  - type: PointLight
    radius: 1.5
    energy: 1
    color: "#a834eb"
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 125
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          AdminInstantEffectSmoke10:
            min: 1
            max: 1 # Frontier: 5<3
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  id: AbyssAltarGold
  parent: AltarBase
  name: golden abyss altar
  components:
  - type: Sprite
    sprite: _HL/Structures/Furniture/Altars/goldabyssaltar.rsi
    layers:
    - state: goldabyss
    - state: lightning
      shader: unshaded
  - type: Icon
    sprite: _HL/Structures/Furniture/Altars/goldabyssaltar.rsi
    state: goldabyss
  - type: PointLight
    radius: 1.5
    energy: 1
    color: "#a834eb"
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 125
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          TreasureCoinGold3:
            min: 1
            max: 3 # Frontier: 5<3
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
