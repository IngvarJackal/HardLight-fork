# Manawa Rite wall decorations: banner and flag

- type: entity
  id: BannerManawaRite
  parent: BannerBase
  name: Manawa Rite banner
  description: A banner bearing the colors and sigil of the Manawa Rite.
  components:
  - type: Sprite
    sprite: _HL/Objects/Factions/ManawaRite/decoration.rsi
    state: banner
  - type: Construction
    graph: ManawaRiteBannersGraph
    node: BannerManawaRiteNode

- type: entity
  id: FlagManawaRite
  parent: PosterBase
  name: Manawa Rite flag
  description: A wall-mounted flag displaying the colors and sigil of the Manawa Rite.
  components:
  - type: Sprite
    sprite: _HL/Objects/Factions/ManawaRite/decoration.rsi
    state: flag
    scale: 0.9, 0.9
  - type: Construction
    graph: ManawaRiteBannersGraph
    node: FlagManawaRiteNode

- type: constructionGraph
  id: ManawaRiteBannersGraph
  start: start
  graph:
    - node: start
      actions:
        - !type:DestroyEntity {}
      edges:
        - to: BannerManawaRiteNode
          completed:
            - !type:SnapToGrid {}
          steps:
            - material: Steel
              amount: 2
              doAfter: 1
            - material: Cloth
              amount: 2
              doAfter: 1
        - to: FlagManawaRiteNode
          completed:
            - !type:SnapToGrid {}
          steps:
            - material: Steel
              amount: 2
              doAfter: 1
            - material: Cloth
              amount: 2
              doAfter: 1

    - node: BannerManawaRiteNode
      entity: BannerManawaRite
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetSteel1
              amount: 2
            - !type:SpawnPrototype
              prototype: MaterialCloth1
              amount: 2
          steps:
            - tool: Screwing
              doAfter: 1

    - node: FlagManawaRiteNode
      entity: FlagManawaRite
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetSteel1
              amount: 2
            - !type:SpawnPrototype
              prototype: MaterialCloth1
              amount: 2
          steps:
            - tool: Screwing
              doAfter: 1
