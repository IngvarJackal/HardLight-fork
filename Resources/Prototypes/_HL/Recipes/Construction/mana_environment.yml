# --- Manual mana wood conversion (50 wood + 1 bluespace crystal = 50 mana wood) ---

- type: construction
  id: ManaWoodConversion
  graph: ManaWoodCraftingGraph
  startNode: start
  targetNode: result
  category: construction-category-decorations
  objectType: Item
  placementMode: PlaceFree


