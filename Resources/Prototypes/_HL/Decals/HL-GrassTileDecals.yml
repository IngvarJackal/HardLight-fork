# Full-tile grass decals sourced from tile RSIs, usable as floor paint.

- type: decal
  id: TileGrass
  tags: ["flora", "station", "markings"]
  snapCardinals: false
  defaultSnap: false
  sprite:
    sprite: /Textures/Objects/Tiles/tile.rsi
    state: grass

